<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI数据透视助手</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 主页面布局 -->
    <div class="main-container">
        <!-- 左侧菜单 -->
        <div class="sidebar">
            <div class="menu-header">
                <h2>AI数据透视助手</h2>
                <button id="toggle-sidebar" class="toggle-sidebar-btn">◀</button>
            </div>
            <ul class="menu-list">
                <li class="menu-item active" data-page="chat">
                    <span>💬</span>
                    <span>新对话</span>
                </li>
                <li class="menu-item" data-page="evaluation">
                    <span>🎯</span>
                    <span>智能评估</span>
                </li>
                <li class="menu-item" data-page="config">
                    <span>⚙️</span>
                    <span>配置</span>
                </li>
            </ul>
        </div>

        <!-- 右侧内容区域 -->
        <div class="content-area">
            <!-- 新对话页面 -->
            <div id="chat-page" class="page active">
                <!-- 对话框触发按钮 -->
                <div id="chat-trigger" class="chat-trigger">
                    <span>🤖</span>
                </div>

                <!-- 对话框 -->
                <div id="chat-container" class="chat-container hidden">
                    <div class="chat-header">
                        <span>AI 对话</span>
                        <div class="chat-controls">
                            <label class="switch">
                                <input type="checkbox" id="output-toggle">
                                <span class="slider"></span>
                            </label>
                            <span class="toggle-label">图表输出</span>
                            <button id="clear-chat" class="clear-btn">清除</button>
                            <button id="close-chat" class="close-btn">&times;</button>
                        </div>
                    </div>
                    <div id="chat-messages" class="chat-messages"></div>
                    <!-- 预设问题 -->
                    <div class="preset-questions">
                        <button class="preset-btn" data-question="中国近十年的GPD增长情况">中国近十年的GDP增长情况</button>
                        <button class="preset-btn" data-question="展示一个销售数据表格">展示一个销售数据表格</button>
                    </div>
                    <div class="chat-input-container">
                        <input type="text" id="user-input" placeholder="输入消息...">
                        <button id="send-btn">发送</button>
                    </div>
                    
                    <!-- 文件上传 -->
                    <div class="file-upload-container">
                        <label for="file-upload" class="file-upload-label">
                            📤
                        </label>
                        <input type="file" id="file-upload" class="file-upload-input" accept=".txt,.csv,.xlsx,.docx">
                        <div class="file-name-container">
                            <span id="file-name" class="file-name">未选择文件</span>
                            <button id="clear-file" class="clear-file-btn" title="清除文件">✕</button>
                        </div>
                    </div>
                </div>

                <!-- 图表输出区域 -->
                <div id="page-output" class="page-output hidden">
                    <div class="output-header">
                        <h2>图表输出</h2>
                        <button id="download-word" class="download-word-btn" title="下载为Word文档">📄</button>
                    </div>
                    <div id="output-messages" class="output-messages"></div>
                </div>
            </div>

            <!-- 智能评估页面 -->
            <div id="evaluation-page" class="page">
                <div class="evaluation-container">
                    <h2>
                        智能评估与跟进
                        <span class="help-icon">❓
                            <div class="help-tooltip">
                                <p class="help-title">目的：</p>
                                <p class="help-content">通过多轮迭代评估，确保AI回答的质量和准确性</p>
                                <p class="help-title">实现原理：</p>
                                <ol class="help-list">
                                    <li>AI根据用户问题生成初始回答</li>
                                    <li>根据评估条件对回答进行评分（0-100分）</li>
                                    <li>如果分数低于85分，自动重新回答（最多3次）</li>
                                    <li>最终根据跟进要求生成总结或提取关键信息</li>
                                </ol>
                            </div>
                        </span>
                    </h2>
                    <div class="evaluation-layout">
                        <!-- 左侧输入区域 -->
                        <div class="evaluation-form">
                            <div class="evaluation-group">
                                <label for="user-question">用户问题:</label>
                                <textarea id="user-question" placeholder="请输入您的问题..." rows="3"></textarea>
                            </div>
                            
                            <div class="evaluation-group">
                                <label for="evaluation-criteria">评估条件:</label>
                                <textarea id="evaluation-criteria" placeholder="请输入评估条件，例如：回答需要准确、全面、有条理..." rows="2"></textarea>
                            </div>
                            
                            <div class="evaluation-group">
                                <label for="follow-up-requirements">跟进要求:</label>
                                <textarea id="follow-up-requirements" placeholder="请输入跟进要求（可选），例如：对回答进行总结、提取关键信息..." rows="2"></textarea>
                            </div>
                            
                            <div class="evaluation-actions">
                                <button id="start-evaluation" class="start-btn">开始评估</button>
                                <button id="clear-evaluation" class="clear-eval-btn">清除结果</button>
                            </div>
                        </div>
                        
                        <!-- 右侧评估结果显示区域 -->
                        <div id="evaluation-results" class="evaluation-results hidden">
                            <div class="results-header">
                                <h3>评估结果</h3>
                                <button id="close-results" class="close-results-btn">&times;</button>
                            </div>
                            <div id="results-content" class="results-content"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 配置页面 -->
            <div id="config-page" class="page">
                <div class="config-container">
                    <h2>AI 模型配置</h2>
                    <div class="config-form">
                        <div class="config-group">
                            <label for="base-url">基础 URL:</label>
                            <input type="text" id="base-url" placeholder="请输入基础 URL" value="http://chat.icbcasia.com:8086/v1">
                        </div>
                        
                        <div class="config-group">
                            <label for="api-key">API 密钥:</label>
                            <div class="input-with-button">
                                <input type="password" id="api-key" placeholder="请输入 API 密钥" value="12345678">
                                <button type="button" id="toggle-api-key" class="toggle-password-btn">👁️</button>
                            </div>
                        </div>
                        
                        <div class="config-group">
                            <label for="model-name">模型名称:</label>
                            <input type="text" id="model-name" placeholder="请输入模型名称" value="qwen3">
                        </div>
                        
                        <div class="config-group">
                            <label for="temperature">温度 (Temperature):</label>
                            <input type="range" id="temperature" min="0" max="1" step="0.01" value="0.2">
                            <span id="temperature-value">0.2</span>
                        </div>
                        
                        <div class="config-group">
                            <label for="max-tokens">最大 Token 数:</label>
                            <input type="number" id="max-tokens" min="1" max="65536" value="65536">
                        </div>
                        
                        <div class="config-group">
                            <label for="top-p">Top P:</label>
                            <input type="range" id="top-p" min="0" max="1" step="0.01" value="0.1">
                            <span id="top-p-value">0.1</span>
                        </div>
                        
                        <div class="config-group">
                            <label for="frequency-penalty">频率惩罚 (Frequency Penalty):</label>
                            <input type="range" id="frequency-penalty" min="0" max="2" step="0.01" value="0.5">
                            <span id="frequency-penalty-value">0.5</span>
                        </div>
                        
                        <div class="config-actions">
                            <button id="save-config" class="save-btn">保存配置</button>
                            <button id="reset-config" class="reset-btn">重置为默认值</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

            

            
        </div>
    </div>

    <!-- 在页面加载后初始化默认显示的页面 -->
    <script src="scripts/marked.min.js"></script>
    <script src="scripts/chart.js"></script>
    <script>
        // 默认显示新对话页面
        document.addEventListener('DOMContentLoaded', function() {
            // 默认激活第一个菜单项和页面
            const firstMenuItem = document.querySelector('.menu-item[data-page="chat"]');
            const chatPage = document.getElementById('chat-page');
            
            if (firstMenuItem) {
                firstMenuItem.classList.add('active');
            }
            
            if (chatPage) {
                chatPage.classList.add('active');
                
                // 确保对话框不会被菜单挡住
                const chatContainer = document.getElementById('chat-container');
                const pageOutput = document.getElementById('page-output');
                
                if (chatContainer) {
                    // 添加样式以确保对话框不会被菜单挡住
                    const style = document.createElement('style');
                    style.textContent = `
                        .chat-container {
                            right: 20px !important;
                        }
                        
                        .page-output {
                            right: 440px !important; /* 为对话框留出空间 */
                        }
                    `;
                    document.head.appendChild(style);
                    
                    // 确保对话框是可见的
                    chatContainer.classList.remove('hidden');
                }
            }
            
            
        });
    </script>
    <script src="scripts/script.js"></script>
</body>
</html>
